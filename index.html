<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sube_foto</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #161a24;
      --border:  #252a38;
      --accent:  #4ade80;
      --accent2: #22d3ee;
      --text:    #e8eaf0;
      --muted:   #5a6070;
      --danger:  #f87171;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .header {
      padding: 22px 28px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .header-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header h1 { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
    .header p  { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

    .viewfinder {
      position: relative; width: 100%; aspect-ratio: 4/3;
      background: #080a10; overflow: hidden;
    }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #canvas { display: none; }

    .corner {
      position: absolute; width: 24px; height: 24px;
      border-color: var(--accent); border-style: solid; border-width: 0; opacity: .7;
    }
    .corner.tl { top:14px;    left:14px;  border-top-width:2px;    border-left-width:2px;  border-radius:4px 0 0 0; }
    .corner.tr { top:14px;    right:14px; border-top-width:2px;    border-right-width:2px; border-radius:0 4px 0 0; }
    .corner.bl { bottom:14px; left:14px;  border-bottom-width:2px; border-left-width:2px;  border-radius:0 0 0 4px; }
    .corner.br { bottom:14px; right:14px; border-bottom-width:2px; border-right-width:2px; border-radius:0 0 4px 0; }

    .scan-line {
      position: absolute; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 2.5s ease-in-out infinite; opacity: 0;
    }
    @keyframes scan {
      0%   { top:10%; opacity:0; } 10% { opacity:.6; } 90% { opacity:.6; } 100% { top:90%; opacity:0; }
    }

    .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); font-size: 13px;
    }
    .placeholder svg { opacity: .3; }
    .flash {
      position: absolute; inset: 0; background: white;
      opacity: 0; pointer-events: none; transition: opacity .05s;
    }
    .flash.active { opacity: 1; }

    .controls { padding: 20px 28px; display: flex; flex-direction: column; gap: 14px; }

    .btn-shutter {
      width: 100%; padding: 15px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #0d0f14;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform .12s, box-shadow .12s, opacity .2s;
      box-shadow: 0 0 28px rgba(74,222,128,.2);
    }
    .btn-shutter:hover    { transform: translateY(-1px); box-shadow: 0 0 40px rgba(74,222,128,.35); }
    .btn-shutter:active   { transform: scale(.97); }
    .btn-shutter:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

    .row { display: flex; gap: 10px; }
    .btn-sec {
      flex: 1; padding: 11px 8px;
      border: 1px solid var(--border); border-radius: 12px;
      background: transparent; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background .15s, border-color .15s, opacity .2s;
    }
    .btn-sec:hover    { background: var(--border); border-color: var(--muted); }
    .btn-sec:disabled { opacity: .35; cursor: not-allowed; }

    .status {
      margin: 0 28px 20px; padding: 12px 16px; border-radius: 10px;
      font-size: 13px; font-family: 'DM Mono', monospace;
      display: none; word-break: break-all;
    }
    .status.info    { background:rgba(34,211,238,.1); border:1px solid rgba(34,211,238,.3); color:var(--accent2); }
    .status.success { background:rgba(74,222,128,.1); border:1px solid rgba(74,222,128,.3); color:var(--accent);  }
    .status.error   { background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--danger);  }
    .status a       { color:inherit; font-weight:700; }

    .thumb-wrap {
      margin: 0 28px 20px; display: none;
      border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border); position: relative;
    }
    .thumb-wrap img { width: 100%; display: block; }
    .thumb-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,.6);
      font-size: 11px; font-family: 'DM Mono', monospace;
      color: var(--muted); padding: 6px 10px;
    }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(13,15,20,.4); border-top-color: #0d0f14;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="header-icon">📷</div>
    <div>
      <h1>sube_foto</h1>
      <p>captura → google drive</p>
    </div>
  </div>

  <div class="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="scan-line"></div>
    <div class="placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Pulsa "Iniciar cámara"
    </div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="controls">
    <button class="btn-shutter" id="btnCaptura" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>
      </svg>
      Capturar y subir a Drive
    </button>
    <div class="row">
      <button class="btn-sec" id="btnInicio">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Iniciar cámara
      </button>
      <button class="btn-sec" id="btnRepetir" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Repetir
      </button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="thumb-wrap" id="thumbWrap">
    <img id="thumbImg" src="" alt="captura" />
    <div class="thumb-label" id="thumbLabel"></div>
  </div>

</div>

<script>
  // URL del backend — ya configurada
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwIVBCaPp0pY_x9FePd09iZobasIj2zSqyukwLmP5p-Iftv-vynCg2MkLXM9CUeLZKQvg/exec";

  const video      = document.getElementById('video');
  const canvas     = document.getElementById('canvas');
  const btnCaptura = document.getElementById('btnCaptura');
  const btnInicio  = document.getElementById('btnInicio');
  const btnRepetir = document.getElementById('btnRepetir');
  const statusEl   = document.getElementById('status');
  const flash      = document.getElementById('flash');
  const placeholder= document.getElementById('placeholder');
  const thumbWrap  = document.getElementById('thumbWrap');
  const thumbImg   = document.getElementById('thumbImg');
  const thumbLabel = document.getElementById('thumbLabel');

  let stream = null;

  function setStatus(msg, type = 'info') {
    statusEl.innerHTML = msg;
    statusEl.className = 'status ' + type;
    statusEl.style.display = 'block';
  }
  function hideStatus() { statusEl.style.display = 'none'; }

  function nombreFoto() {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    return `foto_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.jpg`;
  }

  btnInicio.addEventListener('click', async () => {
    hideStatus();
    btnInicio.disabled = true;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } },
        audio: false
      });
      video.srcObject = stream;
      video.style.display = 'block';
      placeholder.style.display = 'none';
      btnCaptura.disabled = false;
      btnInicio.textContent = '✓ Cámara activa';
      thumbWrap.style.display = 'none';
      btnRepetir.disabled = true;
    } catch(e) {
      setStatus('⚠ No se pudo acceder a la cámara: ' + e.message, 'error');
      btnInicio.disabled = false;
    }
  });

  btnCaptura.addEventListener('click', async () => {
    if (!stream) return;

    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 150);

    canvas.width  = video.videoWidth  || 1280;
    canvas.height = video.videoHeight || 960;
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    const nombre  = nombreFoto();

    thumbImg.src = dataUrl;
    thumbLabel.textContent = nombre;
    thumbWrap.style.display = 'block';

    btnCaptura.disabled = true;
    btnRepetir.disabled = true;
    setStatus('<span class="spinner"></span>&nbsp; Subiendo a Drive…', 'info');

    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ imagen: dataUrl, nombre }),
        headers: { 'Content-Type': 'text/plain' }
      });
      const data = await res.json();
      if (data.ok) {
        setStatus('✓ Guardado: <span>' + data.nombre + '</span>', 'success');
      } else {
        setStatus('✗ Error al guardar: ' + data.error, 'error');
      }
    } catch(err) {
      setStatus('✗ Error de red: ' + err.message, 'error');
    }

    btnRepetir.disabled = false;
  });

  btnRepetir.addEventListener('click', () => {
    thumbWrap.style.display = 'none';
    hideStatus();
    btnCaptura.disabled = false;
    btnRepetir.disabled = true;
  });
</script>
</body>
</html>
